workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest

      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.rork.k1oi3mhgah0fgszldnbv8

    scripts:
      - name: Get Flutter packages
        script: |
          flutter clean
          flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios
          pod repo update
          pod install
          cd ..

      - name: Build signed IPA
        script: |
          flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log

    publishing:
      app_store_connect:
        api_key: Encrypted(5GX7VZ2JVN)
        key_id: 5GX7VZ2JVN
        issuer_id: 838d4d9b-257b-48a3-b564-6df682f00638
        submit_to_testflight: true
        beta_groups:
          - Internal Testers